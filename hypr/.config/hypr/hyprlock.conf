background {
    path = $WALLPAPER_PATH
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

input-field {
    size = 170, 45
    dots_size = 0.2
    outer_color = rgba(255, 255, 255, 0.5)
    inner_color = rgba(0, 0, 0, 0)
    font_color = rgba(255, 255, 255, 0.5)
    fade_on_empty = false
    placeholder_text = Enter password:
    hide_input = false
    halign = center
    valign = center
}
